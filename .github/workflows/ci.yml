name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd plugins/vscode-devpulse && npm install && npm run compile

  intellij:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: cd plugins/intellij-devpulse && chmod +x gradlew && ./gradlew buildPlugin
