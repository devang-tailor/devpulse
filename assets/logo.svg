<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pulse/heartbeat line -->
  <polyline points="80,256 160,256 190,180 220,332 250,200 280,256 340,256 370,190 400,290 432,256"
    fill="none" stroke="url(#pulse)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code brackets -->
  <text x="110" y="400" font-family="monospace" font-size="120" fill="white" opacity="0.3" font-weight="bold">&lt;/&gt;</text>
  <!-- DP letters -->
  <text x="280" y="420" font-family="system-ui, sans-serif" font-size="100" fill="white" opacity="0.25" font-weight="900">DP</text>
</svg>
